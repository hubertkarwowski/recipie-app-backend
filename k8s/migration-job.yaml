apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: recipe-app:latest
          imagePullPolicy: IfNotPresent
          command: ['alembic', 'upgrade', 'head']
          envFrom:
            - configMapRef:
                name: recipe-app-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipe-app-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipe-app-secrets
                  key: REDIS_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: recipe-app-secrets
                  key: DATABASE_URL
