apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - '60'
            - '1'
            - --loglevel
            - warning
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipe-app-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ['redis-cli', '-a', '$(REDIS_PASSWORD)', 'ping']
            initialDelaySeconds: 3
            periodSeconds: 5
